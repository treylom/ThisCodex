name: Publish Codex plugin package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run packaging validation without publishing"
        required: false
        default: "true"

jobs:
  validate-plugin-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run tests
        run: npm test
      - name: Validate plugin manifest
        run: |
          node -e "const p=require('./.codex-plugin/plugin.json'); for (const k of ['name','version','description','skills','interface']) if (!(k in p)) throw new Error('missing '+k); if (p.skills !== './skills/') throw new Error('skills must be ./skills/');"
      - name: Validate sync script syntax
        run: bash -n scripts/sync-to-codex-plugin.sh
